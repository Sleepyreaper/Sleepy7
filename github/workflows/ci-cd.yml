name: sleepy7-ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install fastlane
        run: gem install fastlane

      - name: Run iOS unit tests
        run: fastlane scan

      - name: Build IPA archive
        run: fastlane gym

      - name: Upload to TestFlight (main only)
        if: github.ref == 'refs/heads/main'
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
        run: fastlane pilot upload

  infra-and-functions:
    runs-on: ubuntu-latest
    needs: ios
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI version
        run: az version

      - name: Bicep lint/validate
        run: az bicep build --file infra/main.bicep

      - name: What-if
        run: |
          az deployment sub what-if \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters infra/parameters/staging.bicepparam

      - name: Deploy infrastructure
        if: github.event_name != 'pull_request'
        run: |
          az deployment sub create \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters infra/parameters/staging.bicepparam \
            --query properties.outputs > deployment-outputs.json

      - name: Get Function App Name
        if: github.event_name != 'pull_request'
        id: outputs
        run: |
          FUNCTION_APP_NAME=$(jq -r '.functionAppName.value' deployment-outputs.json)
          echo "function_app_name=$FUNCTION_APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Build & test Functions
        run: |
          cd api
          npm ci
          npm run test

      - name: Deploy Functions
        if: github.event_name != 'pull_request'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.outputs.outputs.function_app_name }}
          package: api