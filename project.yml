name: Sleepy7
options:
  minimumXcodeGenVersion: 2.38.0

packages:
  swift-collections:
    url: https://github.com/apple/swift-collections
    from: 1.1.0

targets:
  Sleepy7:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sleepy7
    resources:
      - Sleepy7/Resources
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.sleepyreaper.sleepy7
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - package: swift-collections
        product: Collections

  Sleepy7Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sleepy7Tests
    dependencies:
      - target: Sleepy7